name: Build And Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libsqlite3-dev libx11-dev libxfixes-dev libxft-dev libgtk-3-dev \
            qtbase5-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          cpack --config build/CPackConfig.cmake
          mkdir -p dist/linux
          shopt -s nullglob
          for f in cliphist-*-Linux.deb cliphist-*-Linux.tar.gz; do
            mv "$f" dist/linux/
          done
          ls -lah dist/linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: cliphist-linux-packages
          path: dist/linux/*
          if-no-files-found: error

  package-windows:
    name: Package Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-nsis

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCLIPHIST_ENABLE_X11=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Package
        shell: msys2 {0}
        run: |
          cpack --config build/CPackConfig.cmake
          mkdir -p dist/windows
          shopt -s nullglob
          for f in cliphist-*-win64.exe cliphist-*-win64.zip cliphist-*-Windows.exe cliphist-*-Windows.zip; do
            mv "$f" dist/windows/
          done
          ls -lah dist/windows

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: cliphist-windows-packages
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-windows
    permissions:
      contents: write

    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: cliphist-linux-packages
          path: dist/linux

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: cliphist-windows-packages
          path: dist/windows

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/linux/*
            dist/windows/*
